<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料相談 | Headless Migration</title>
  <meta name="description" content="WordPressから静的サイトへの移行について、無料でご相談いただけます。サイトURLをお送りください。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; line-height: 1.8; }
    a { color: inherit; text-decoration: none; }

    /* Header */
    header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); border-bottom: 1px solid #1a1a1a; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .header-nav { display: flex; gap: 28px; align-items: center; }
    .header-nav a { font-size: 12px; color: #aaa; letter-spacing: 0.05em; transition: color 0.2s; }
    .header-nav a:hover { color: #fff; }

    /* Hero */
    .contact-hero { padding: 80px 40px 60px; text-align: center; border-bottom: 1px solid #1a1a1a; }
    .contact-hero .label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #666; margin-bottom: 20px; }
    .contact-hero h1 { font-size: clamp(24px, 4vw, 36px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.4; margin-bottom: 20px; }
    .contact-hero p { color: #888; font-size: 14px; max-width: 480px; margin: 0 auto; line-height: 1.9; }

    /* Form Section */
    .contact-section { max-width: 640px; margin: 0 auto; padding: 60px 40px 80px; }

    .form-item { margin-bottom: 24px; }
    .form-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #ccc; margin-bottom: 8px; font-weight: 600; }
    .form-required { background: #c0392b; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; }
    .form-optional { color: #555; font-size: 11px; }
    .form-input,
    .form-textarea {
      width: 100%; background: #111; border: 1px solid #2a2a2a; color: #f0f0f0;
      padding: 12px 14px; font-size: 14px; border-radius: 4px; transition: border-color 0.2s; font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: #555; }
    .form-input::placeholder, .form-textarea::placeholder { color: #444; }
    .form-textarea { resize: vertical; line-height: 1.7; }

    .form-checkbox { display: flex; align-items: center; gap: 10px; margin: 32px 0 28px; }
    .form-checkbox input[type="checkbox"] { width: 17px; height: 17px; accent-color: #fff; cursor: pointer; flex-shrink: 0; }
    .form-checkbox label { font-size: 13px; color: #aaa; cursor: pointer; }
    .form-checkbox a { color: #fff; text-decoration: underline; }

    .form-submit { width: 100%; background: #fff; color: #0a0a0a; border: none; padding: 16px; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
    .form-submit:hover { opacity: 0.85; }
    .form-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-note { text-align: center; color: #555; font-size: 12px; margin-top: 16px; line-height: 1.7; }

    .form-error { color: #e05555; font-size: 13px; margin-top: 6px; }
    .form-global-error { background: #1a0a0a; border: 1px solid #5a1a1a; color: #e05555; padding: 14px 16px; border-radius: 4px; font-size: 13px; margin-bottom: 20px; }

    /* Success */
    .form-success { text-align: center; padding: 60px 40px; }
    .form-success h2 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
    .form-success p { color: #888; font-size: 14px; line-height: 1.9; }
    .form-success .back-link { display: inline-block; margin-top: 32px; color: #aaa; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 2px; }
    .form-success .back-link:hover { color: #fff; }

    /* Footer */
    footer { border-top: 1px solid #1a1a1a; padding: 40px; text-align: center; }
    footer p { font-size: 12px; color: #444; }

    @media (max-width: 640px) {
      header { padding: 0 20px; }
      .contact-hero { padding: 60px 20px 40px; }
      .contact-section { padding: 40px 20px 60px; }
      footer { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="header-logo">Headless Migration</a>
    <nav class="header-nav">
      <a href="/column/">コラム</a>
      <a href="/contact/">無料相談</a>
    </nav>
  </header>

  <div class="contact-hero">
    <p class="label">Free Consultation</p>
    <h1>あなたのサイトは<br>移行できますか？</h1>
    <p>サイトURLをご共有いただければ、対応可否と費用感を無料でお伝えします。<br>お気軽にご相談ください。</p>
  </div>

  <div class="contact-section">
    <div id="form-container">
      <form id="contact-form" novalidate>
        <div id="global-error" class="form-global-error" style="display:none;"></div>

        <div class="form-item">
          <div class="form-label">お名前 <span class="form-required">必須</span></div>
          <input class="form-input" type="text" id="name" placeholder="山田 太郎" required>
        </div>

        <div class="form-item">
          <div class="form-label">会社名 <span class="form-optional">任意</span></div>
          <input class="form-input" type="text" id="company" placeholder="株式会社〇〇">
        </div>

        <div class="form-item">
          <div class="form-label">メールアドレス <span class="form-required">必須</span></div>
          <input class="form-input" type="email" id="email" placeholder="info@example.com" required>
        </div>

        <div class="form-item">
          <div class="form-label">現在のWebサイトURL <span class="form-optional">任意</span></div>
          <input class="form-input" type="url" id="url" placeholder="https://example.com">
        </div>

        <div class="form-item">
          <div class="form-label">ご相談内容 <span class="form-required">必須</span></div>
          <textarea class="form-textarea" id="message" rows="6" placeholder="現在のサイトの状況や、ご不明点・ご要望などをご記入ください。" required></textarea>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="privacy" required>
          <label for="privacy"><a href="/privacy/">プライバシーポリシー</a>に同意する</label>
        </div>

        <button type="submit" class="form-submit" id="submit-btn">送信する</button>
        <p class="form-note">送信後、自動返信メールをお送りします。<br>通常3営業日以内に担当者よりご連絡いたします。</p>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2025 Headless Migration. All rights reserved.</p>
  </footer>

  <script>
    const form = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    const globalError = document.getElementById('global-error');
    const formContainer = document.getElementById('form-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const company = document.getElementById('company').value.trim();
      const email = document.getElementById('email').value.trim();
      const url = document.getElementById('url').value.trim();
      const message = document.getElementById('message').value.trim();
      const privacy = document.getElementById('privacy').checked;

      globalError.style.display = 'none';

      if (!privacy) {
        globalError.textContent = 'プライバシーポリシーへの同意が必要です。';
        globalError.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.value = '送信中...';

      try {
        const res = await fetch('/.netlify/functions/submit-contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, company, email, url, message }),
        });
        const data = await res.json();

        if (data.status === 'ok') {
          formContainer.innerHTML = `
            <div class="form-success">
              <h2>ありがとうございます</h2>
              <p>お問い合わせを受け付けました。<br>
              入力いただいたメールアドレス宛に自動返信メールをお送りしました。<br>
              通常3営業日以内に担当者よりご連絡いたします。</p>
              <a href="/" class="back-link">← トップページに戻る</a>
            </div>
          `;
        } else {
          globalError.textContent = data.message || '送信に失敗しました。再度お試しください。';
          globalError.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.value = '送信する';
        }
      } catch {
        globalError.textContent = '通信エラーが発生しました。しばらく経ってから再度お試しください。';
        globalError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.value = '送信する';
      }
    });
  </script>

</body>
</html>
